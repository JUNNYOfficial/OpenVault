name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test

  validate-camouflage:
    runs-on: ubuntu-latest
    name: Validate camouflage looks legitimate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Generate test camouflage files
        run: |
          node -e "
            const { seal } = require('./src/core');
            const fs = require('fs');
            const { execSync } = require('child_process');
            
            execSync('git config user.email \"ci@openvault.local\"');
            execSync('git config user.name \"CI\"');
            
            require('./src/core').initRepo('.');
            
            fs.writeFileSync('test-secret.txt', 'This is a test secret for CI validation');
            seal('test-secret.txt', 'markdown-tutorial');
            seal('test-secret.txt', 'markdown-blog');
            seal('test-secret.txt', 'python-script');
            seal('test-secret.txt', 'js-config');
            seal('test-secret.txt', 'typescript-config');
            seal('test-secret.txt', 'rust-cargo');
            seal('test-secret.txt', 'shell-script');
          "
      - name: Check files look legitimate
        run: |
          echo "=== Markdown Tutorial ==="
          head -20 docs/react-hooks-guide.md
          echo ""
          echo "=== Markdown Blog ==="
          head -20 docs/web-performance-tips.md
          echo ""
          echo "=== Python Script ==="
          head -20 scripts/csv_converter.py
          echo ""
          echo "=== JS Config ==="
          head -20 config/vite.config.js
          echo ""
          echo "=== TypeScript Config ==="
          head -20 tsconfig.json
          echo ""
          echo "=== Rust Cargo ==="
          head -20 Cargo.toml
          echo ""
          echo "=== Shell Script ==="
          head -20 scripts/deploy.sh
      - name: Validate no obvious encryption markers
        run: |
          # Check that files don't contain base64-looking blobs
          ! grep -E '[A-Za-z0-9+/]{40,}={0,2}' docs/react-hooks-guide.md || true
          ! grep -E '[A-Za-z0-9+/]{40,}={0,2}' docs/web-performance-tips.md || true
          
          # Check that markdown files have proper structure
          grep -q "^# " docs/react-hooks-guide.md
          grep -q "^# " docs/web-performance-tips.md
          
          # Check that python file is valid python syntax
          python3 -m py_compile scripts/csv_converter.py
          
          # Check that JS config has exports
          grep -q "export" config/vite.config.js
          
          # Check that TypeScript config has compilerOptions
          grep -q "compilerOptions" tsconfig.json
          
          # Check that Cargo.toml has package section
          grep -q "^\[package\]" Cargo.toml
          
          # Check that shell script has shebang
          head -1 scripts/deploy.sh | grep -q "#!/bin/bash"
          
          echo "✅ All camouflage validation passed"
      - name: Test round-trip decryption
        run: |
          node -e "
            const { unlock } = require('./src/core');
            const fs = require('fs');
            
            const decrypted = unlock('docs/react-hooks-guide.md');
            const content = fs.readFileSync(decrypted, 'utf-8');
            
            if (content.includes('test secret for CI validation')) {
              console.log('✅ Round-trip decryption successful');
            } else {
              console.error('❌ Decryption failed');
              process.exit(1);
            }
          "
