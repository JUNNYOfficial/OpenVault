name: Auto Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'mobile/**'
      - '.github/workflows/auto-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Frontend
        run: |
          mkdir -p _site
          cp -r frontend/* _site/
          echo "🌐 Frontend prepared for deployment"
          ls -la _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  validate-templates:
    name: Validate All Camouflage Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci

      - name: Generate test files for all templates
        run: |
          node -e "
            const { seal } = require('./src/core');
            const fs = require('fs');
            const { execSync } = require('child_process');
            
            execSync('git config user.email \"ci@openvault.local\"');
            execSync('git config user.name \"CI\"');
            
            require('./src/core').initRepo('.');
            
            fs.writeFileSync('test-secret.txt', 'This is a test secret for CI validation');
            
            const templates = [
              'markdown-tutorial',
              'markdown-blog', 
              'python-script',
              'js-config',
              'dockerfile',
              'github-action',
              'json-config',
              'typescript-config',
              'rust-cargo',
              'go-module',
              'shell-script',
              'env-file'
            ];
            
            templates.forEach(t => {
              try {
                seal('test-secret.txt', t);
                console.log('✅ Template:', t);
              } catch (err) {
                console.error('❌ Template failed:', t, err.message);
                process.exit(1);
              }
            });
            
            console.log('\\n🎉 All 12 templates generated successfully');
          "

      - name: Validate template outputs
        run: |
          echo "=== TypeScript Config ==="
          head -10 tsconfig.json
          echo ""
          echo "=== Rust Cargo ==="
          head -10 Cargo.toml
          echo ""
          echo "=== Go Module ==="
          head -5 go.mod
          echo ""
          echo "=== Shell Script ==="
          head -5 scripts/deploy.sh
          echo ""
          echo "=== Env File ==="
          head -5 .env.example

      - name: Test round-trip for new templates
        run: |
          node -e "
            const { unlock } = require('./src/core');
            const fs = require('fs');
            
            const templates = [
              { file: 'tsconfig.json', type: 'typescript-config' },
              { file: 'Cargo.toml', type: 'rust-cargo' },
              { file: 'go.mod', type: 'go-module' },
              { file: 'scripts/deploy.sh', type: 'shell-script' },
              { file: '.env.example', type: 'env-file' }
            ];
            
            let allPassed = true;
            templates.forEach(({ file, type }) => {
              try {
                const decrypted = unlock(file);
                const content = fs.readFileSync(decrypted, 'utf-8');
                if (content.includes('test secret for CI validation')) {
                  console.log('✅ Round-trip:', type);
                } else {
                  console.error('❌ Decryption content mismatch:', type);
                  allPassed = false;
                }
              } catch (err) {
                console.error('❌ Round-trip failed:', type, err.message);
                allPassed = false;
              }
            });
            
            if (!allPassed) process.exit(1);
            console.log('\\n🎉 All round-trip tests passed');
          "
